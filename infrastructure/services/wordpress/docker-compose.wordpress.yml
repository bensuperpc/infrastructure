services:
  # Wordpress
  wordpress:
    image: wordpress:fpm
    container_name: wordpress
    profiles:
      - wordpress
    restart: on-failure:7
    depends_on:
      - wordpress_db
      - caddy
    env_file:
      - ./env/wordpress.env
    environment:
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ./config/wordpress/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - wordpress:/var/www/html:rw
    networks:
      - wordpress-network
    security_opt:
      - no-new-privileges:true

  # Database wordpress
  wordpress_db:
    image: mariadb:latest
    container_name: wordpress_db
    profiles:
      - database
      - wordpress
    depends_on:
      - caddy
    restart: on-failure:7
    volumes:
      - wordpress_db:/var/lib/mysql:rw
    env_file:
      - ./env/wordpress_db.env
    environment:
      - TZ=${TZ:-Europe/Paris}
    command: '--default-authentication-plugin=mysql_native_password'
    networks:
      - wordpress-network
    security_opt:
      - no-new-privileges:true

  wordpress_backup:
    image: mazzolino/restic:latest
    container_name: wordpress_backup
    profiles:
      - wordpress
    depends_on:
      - wordpress
    restart: on-failure:7
    env_file:
      - ./env/wordpress_backup.env
    environment:
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - wordpress_backup:/mnt/restic
      - wordpress_db:/data/wordpress_db:ro
      - wordpress:/data/wordpress:ro
    network_mode: none
    cap_drop:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

volumes:
  wordpress_db:
    name: wordpress_db
  wordpress:
    name: wordpress
  wordpress_backup:
    name: wordpress_backup

networks:
  wordpress-network:
    driver: bridge
    name: wordpress-network
