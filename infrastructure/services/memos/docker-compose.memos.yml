services:
  # memos
  memos:
    image: neosmemo/memos:latest
    container_name: memos
    profiles:
      - memos
    restart: on-failure:7
    depends_on:
      - caddy
    env_file:
      - ./env/memos.env
    volumes:
      - memos_config:/var/opt/memos
    networks:
      - caddy-tools
    security_opt:
      - no-new-privileges:true

volumes:
  memos_config:
    name: memos_config

networks:
  caddy-tools:
    driver: bridge
    name: caddy-tools
