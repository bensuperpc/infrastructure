services:
  # psitransfer
  psitransfer:
    image: psitrax/psitransfer:latest
    container_name: psitransfer
    profiles:
      - psitransfer
    restart: on-failure:7
#    user: ${PUID:-1000}:${PGID:-1000} 
    depends_on:
      - caddy
    env_file:
      - ./env/psitransfer.env
    environment:
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - psitransfer_data:/data
    networks:
      - caddy-files
    security_opt:
      - no-new-privileges:true
    read_only: true

volumes:
  psitransfer_data:
    name: psitransfer_data

networks:
  caddy-files:
    driver: bridge
    name: caddy-files