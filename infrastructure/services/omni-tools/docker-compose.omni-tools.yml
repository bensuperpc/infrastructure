services:
  # omni-tools
  omni-tools0:
    image: iib0011/omni-tools:latest
    container_name: omni-tools0
    profiles:
      - omni-tools
    restart: on-failure:7
    depends_on:
      - caddy
    networks:
      - caddy-tools
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - SYS_ADMIN
    environment:
      - TZ=${TZ:-Europe/Paris}

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.001'
          memory: 20M

  omni-tools1:
    image: iib0011/omni-tools:latest
    container_name: omni-tools1
    profiles:
      - omni-tools
    restart: on-failure:7
    depends_on:
      - caddy
    networks:
      - caddy-tools
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - SYS_ADMIN
    environment:
      - TZ=${TZ:-Europe/Paris}

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.001'
          memory: 20M

networks:
  caddy-tools:
    driver: bridge
    name: caddy-tools
