services:
  # projectsend
  projectsend:
    image: linuxserver/projectsend:latest
    container_name: projectsend
    profiles:
      - projectsend
    restart: on-failure:7
    depends_on:
      - caddy
    env_file:
      - ./env/projectsend.env
    volumes:
      - projectsend_config:/config
      - projectsend_share:/data
    networks:
      - caddy-files
      - projectsend-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - SYS_ADMIN

  # Database projectsend
  projectsend_db:
    image: mariadb:latest
    container_name: projectsend_db
    profiles:
      - database
      - projectsend
    depends_on:
      - caddy
    restart: on-failure:7
    volumes:
      - projectsend_db:/var/lib/mysql:rw
    env_file:
      - ./env/projectsend_db.env
    environment:
      - TZ=${TZ:-Europe/Paris}
    command: '--default-authentication-plugin=mysql_native_password'
    networks:
      - projectsend-internal
    security_opt:
      - no-new-privileges:true

volumes:
  projectsend_db:
    name: projectsend_db
  projectsend_config:
    name: projectsend_config
  projectsend_share:
    name: projectsend_share


networks:
  caddy-files:
    driver: bridge
    name: caddy-files
  projectsend-internal:
    driver: bridge
    name: projectsend-internal
