services:
  # Caddy
  caddy:
    #image: bensuperpc/caddy-l4:latest
    image: caddy:latest
    container_name: caddy
    profiles:
      - caddy
    depends_on:
      main_infrastructure:
        condition: service_completed_successfully
    restart: on-failure:5
    ports:
      - 80:80/tcp
      - 80:80/udp
      - 443:443/tcp
      - 443:443/udp
    volumes:
      - caddy_data:/data:rw
      - caddy_config:/config:rw
      - ./config:/etc/caddy:ro
      - wordpress:/var/www/html:rw
      - public_data:/public_data:ro

    networks:
      - qbittorrent-network
      - syncthing-network
      - jellyfin-network
      - forgejo-network
      - argus-network
      - it-tools-network
      - homepage-network
      - dufs-network
      - cyberchef-network
      - open-webui-network
      - uptimekuma-network
      - stirlingpdf-network
      - psitransfer-network
      - transmission-network
      - projectsend-network
      - omni-tools-network
      - privatebin-network
      - picoshare-network
      - memos-network
      - dependency-track-network
      - searxng-network
      - wordpress-network
#      - satisfactory-network
#      - teamfortress2-network
#      - minecraft-network
#      - 7daystodie-network
#      - openssh-network
    env_file:
      - ./env/caddy.env
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: pidof caddy || exit 1
      interval: 120s
      timeout: 10s
      retries: 3

  caddy_backup:
    image: mazzolino/restic:latest
    container_name: caddy_backup
    profiles:
      - caddy
    depends_on:
      - caddy
    restart: on-failure:5
    env_file:
      - ./env/caddy_backup.env
    volumes:
      - caddy_backup:/mnt/restic
      - caddy_data:/data:ro
    network_mode: none
    cap_drop:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  caddy_backup:
    name: caddy_backup
  wordpress:
    name: wordpress
  public_data:
    name: public_data
